<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contenedor {
            width: 50%;
            height: 500px;
            border: 1px solid blue;
            display: grid;
            grid-template-columns: repeat(3, 1fr);

        }

        .col1,
        .col2,
        .col3 {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .col1 img {
            width: 100px;

        }

        .col2 img {
            width: 150px;
        }

        .col3 img {
            width: 180px;

        }
    </style>

</head>

<body>
    <div class="contenedor">
        <div class="col1">
            <div><img src="ejercicios/img/dribble_3.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_4.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_7.png" alt=""></div>


        </div>
        <div class="col2">
            <div><img src="ejercicios/img/dribble_3.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_4.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_7.png" alt=""></div>
        </div>
        <div class="col3">
            <div><img src="ejercicios/img/dribble_3.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_4.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_7.png" alt=""></div>
        </div>
    </div>
</body>

</html>
