<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tareas</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 20vh;
            /* background-color: rgba(245, 245, 220, 0.678); */
        }

        h1 {
            text-align: center;
            padding: 1rem;
        }

        ul {
            margin-top: 1rem;
        }

        /* Color para elementos pares */
        ul li:nth-child(even) {
            background-color: #72BAA9;
        }

        /* Color para elementos impares */
        ul li:nth-child(odd) {
            background-color: #D5E7B5;
        }

        li {
            display: grid;
            align-items: center;
            grid-template-columns: 1rem 1fr auto;
            gap: 10px;

            list-style: none;
            color: black;
            line-height: 1.8;
            border-bottom: 1px solid rgb(187, 186, 186);
            padding: 5px;

        }

        li button {
            padding: 3px;
            height: fit-content;
            background-color: #E03F4F;
            color: white;
            border: none;
            border-radius: 3px;

        }

        li.tachado span {
            text-decoration: line-through;
            color: grey;
        }



        .app {
            min-height: 40vh;
            min-width: 40vw;
            border: 2px solid black;
            border-radius: 10px;
            padding: 20px;


        }

        .editor {
            border-bottom: 1px solid rgb(196, 195, 195);
            padding: 20px;
            display: flex;
            gap: 5px;

        }

        .editor input,
        li input {
            color: red;
            font-size: 1.2rem;
            flex-grow: 3;
        }

        .editor button {
            font-size: 1.3rem;
            flex-grow: 1;
        }

        /* https://desarrolloweb.com/articulos/estilos-css-campos-checkbox */

        .mycheck2 {
            cursor: pointer;
            background-color: #fff;
            color: #fff;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
            width: 18px;
            height: 18px;
            appearance: none;
            border: 2px solid #888;
            border-radius: 3px;
            background-position: 0 -2rem;
            background-size: 100%;
            background-repeat: no-repeat;
            transition: all 0.3s ease-in-out;
        }

        .mycheck2:checked {
            background-color: rgb(75, 156, 13);
            color: rgb(75, 156, 13);
            background-position: 0 0;
        }
    </style>

</head>

<body>
    <div class="app">
        <h1>Mi lista de tareas</h1>
        <div class="editor">
            <input type="text" name="" id="nueva_tarea" placeholder="Nueva tarea">
            <button onclick="crear_tarea()">Crear</button>
        </div>
        <div class="botonera">
            <button onclick="guardar_lista()">Guardar</button>
            <button onclick="cargar_lista()">Cargar</button>
        </div>
        <ul id="tareas"></ul>
    </div>

    <script>


        function crear_tarea() {
            const input = document.getElementById("nueva_tarea");
            const texto = input.value;

            const li = document.createElement('li');
            const check = document.createElement('input');
            check.type = "checkbox";
            check.className = "mycheck2";
            check.onclick = function () { alternar(this); }

            const span = document.createElement('span');
            span.innerHTML = texto;
            span.onclick = function () { editar_tarea(this); }

            const boton = document.createElement('button');
            boton.innerHTML = "Borrar";
            boton.onclick = function () { borrar_tarea(this); }

            li.appendChild(check);
            li.appendChild(span);
            li.appendChild(boton);

            const lista = document.getElementById("tareas");
            lista.appendChild(li);

            //lista.prepend(li);

            input.value = "";
            input.focus();

        }
        function borrar_tarea(boton) {
            const li = boton.parentNode;
            li.parentNode.removeChild(li);

        }
        function alternar(casilla) {
            const li = casilla.parentNode;
            if (casilla.checked) {
                li.className = "tachado";
            }
            else {
                li.className = "";
            }
        }

        function editar_tarea(span) {
            const texto_actual = span.innerHTML;
            const input = document.createElement('input');
            input.type = "text";
            input.value = texto_actual;

            input.onblur = function () {
                if (input.value === '') {
                    span.innerHTML = texto_actual;
                }
                else {
                    span.innerHTML = input.value;
                }
                input.parentNode.replaceChild(span, input);

            };
            span.parentNode.replaceChild(input, span);
            input.focus();

        }
        function guardar_lista() {
            const tareas = document.getElementById("tareas");
            let elementos = tareas.getElementsByTagName('span');
            let lista = [];

            for (let i = 0; i < elementos.length; i++) {
                lista.push(elementos[i].innerHTML);
            }

            localStorage.setItem('mis_tareas', JSON.stringify(lista));
        }

        function cargar_lista() {
            let datos = localStorage.getItem('mis_tareas');
            let lista_guardada = JSON.parse(datos);

            for (let i = 0; i < lista_guardada.length; i++){
                crear_tarea_2(lista_guardada[i]);
            }



        }
        function crear_tarea_2(nueva_tarea) {

            let texto = nueva_tarea;

            const li = document.createElement('li');
            const check = document.createElement('input');
            check.type = "checkbox";
            check.className = "mycheck2";
            check.onclick = function () { alternar(this); }

            const span = document.createElement('span');
            span.innerHTML = texto;
            span.onclick = function () { editar_tarea(this); }

            const boton = document.createElement('button');
            boton.innerHTML = "Borrar";
            boton.onclick = function () { borrar_tarea(this); }

            li.appendChild(check);
            li.appendChild(span);
            li.appendChild(boton);

            const lista = document.getElementById("tareas");
            lista.appendChild(li);

        }

    </script>
</body>

</html>
