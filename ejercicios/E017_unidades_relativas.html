<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de diseño fluido</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        body{
 
            font-family: sans-serif;
        }
        .hero-section{
            width: 100vw;
            height: 50vh;
            background-color: green;
            color:white;
            text-align: center;
            margin-bottom: 4rem;
        }
        .hero-title{
            font-size: 8vw;
        }
        .fluido{
            width: 80vw;
            height:10vh;
            margin: 0 auto;
            text-align: center;
            /* border:1px solid blue; */
            font-size: 2.5vmax;
            background-color: rgb(195, 195, 195);
            border-radius: 0.5rem;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <h1 class="hero-title">Diseño fluido con vw y vh</h1>
    </div>
    <p class="fluido">
        Este es un texto que se adapta dinámicamente al tamaño de la ventana. <br>
        Cambia el tamaño de la ventana y a ver qué pasa.
    </p>
</body>
</html>
