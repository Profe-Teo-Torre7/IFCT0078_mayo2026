<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .contenedor {
            width: 50%;
            height: 500px;
            border: 1px solid blue;
            display: grid;
            grid-template-columns: repeat(3, 1fr);

        }

        .col1,
        .col2,
        .col3 {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .col1 img {
            width: 100px;

        }

        .col2 img {
            width: 150px;
        }

        .col3 img {
            width: 180px;

        }

        .dia {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid blue;
            font-size: 3rem;
            border-radius: 8px;
        }

        .dia:hover {
            background-color: antiquewhite;
        }

        .semana{
            display: flex;
            justify-content: space-evenly;
            padding-bottom: 1rem;
            border-bottom: 2px solid blue;
        }
    </style>

</head>

<body>
    <div class="contenedor">
        <div class="col1">
            <div><img src="ejercicios/img/dribble_3.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_4.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_7.png" alt=""></div>


        </div>
        <div class="col2">
            <div><img src="ejercicios/img/dribble_3.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_4.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_7.png" alt=""></div>
        </div>
        <div class="col3">
            <div><img src="ejercicios/img/dribble_3.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_4.png" alt=""></div>
            <div><img src="ejercicios/img/dribble_7.png" alt=""></div>
        </div>
    </div>

    <hr>
    <hr>
    <div class="dia">1</div>
    <div class="dia">1</div>

    <div class="semana">
        <div>Lun</div>
        <div>Mar</div>
        <div>Mié</div>
        <div>Jue</div>
        <div>Vie</div>
        <div>Sáb</div>
        <div>Dom</div>
    </div>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>

</html>
