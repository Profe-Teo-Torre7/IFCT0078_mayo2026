<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidas</title>
    <style>
        .contenedor{
            display:grid;
            grid-template-columns: repeat(3,1fr);
            background-color: brown;
            gap:0.5rem;
            padding:1rem;
            max-width: 960px;
            margin:0 auto;
            border-radius: 5px;
            /* justify-content: center;
            align-items: center; 
            place-content: center;
            height: 100vh;*/
        }
        .contenedor div{
            border: 1px solid blue;
            background-color: rgb(213, 231, 231);
            border-radius: 6px;

        }
        .contenedor .elem-1{
            /* grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 1;
            grid-row-end: 4; */

            /* grid-column: 1 / 3;
            grid-row: 1 / 4; */
            grid-area: 1/1/4/3;
            
           
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="elem-1">1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>
</body>
</html>
