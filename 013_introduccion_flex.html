<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introducción a flex</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .contenedor{
            display:flex;
            flex-direction: row;
            /* Disposición horizontal */
            justify-content:center; 

            /* Disposición vertical */
            align-items: center;

            gap: 1rem;

            flex-wrap: nowrap;


            border:2px solid red;
            box-sizing: border-box;
            padding:1rem;
            height: 100vh;
        }
       
        div{
            height: 200px;
            width: 500px;
            border:1px solid blue;
            font-size: 3rem;
        }
        .numero{
            display: flex;
            /* Disposición horizontal */
            justify-content:center; 

            /* Disposición vertical */
            align-items: center;            
        }
        .uno{
            flex-grow: 1;
            flex-basis: 800px;
        }
        .dos{
            flex-shrink: 3;
        }
    </style>
</head>
<body>
    <section class="contenedor">
        <div class="numero uno">1</div>
        <div class="numero dos">2</div>
        <div class="numero">3</div>
        <!-- <div class="numero">4</div>
        <div class="numero">5</div>
        <div class="numero">6</div>
        <div class="numero">7</div>
        <div class="numero">8</div>
        <div class="numero">9</div>         -->
 
</body>
</html>
