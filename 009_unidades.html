<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        html {
            font-size: 16px;
        }

        .primero {
            width: 100vw;
            height: 100vh;
            background-color: aqua;
        }

        .segundo {
            width: 50%;
            height: 100px;
            background-color: rgb(225, 159, 159);
            padding:2rem;
            margin:1.5rem;

            
        }

        h1 {
            font-size: 3vh;
        }

        p {
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="primero">
        <h1>Esto son 3 rem</h1>
        <div class="segundo">
            <p>
                Esto es medio rem
            </p>

        </div>
    </div>
</body>

</html>
