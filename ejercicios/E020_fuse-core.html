<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Fuse Core</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        li {
            display: inline-block;
            padding: 8px;
            border: 2px solid white;
            border-radius: 2.5rem;
             
            font-size: 1.5rem;
        }

        .fondo {
            width: 100vw;
            height: 100vh;
            background-image: url("https://picsum.photos/1920/1080");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

            overflow: hidden;

            text-align: center;
        }

        .contenido {
            box-sizing: border-box;
            padding-top: 12vh;
            height: 65vh;
            background-color: rgba(158, 156, 156, 0.383);
            color: white;
        }

        .centrado {

            width: 15vh;
            height: 15vh;
            border: 2px solid white;
            border-radius: 7.5vh;
        }

        .fuse {
            font-size: 2.5rem;
            padding: 0.5rem 0;
        }

        .subtitulo {
            font-size: 1.3rem;
            padding: 1rem 0;
        }

        .final {
            font-size: 0.8rem;
            padding-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="fondo">
        <div class="contenido">
            <img class="centrado" src="img/favicon.png" alt="">
            <h2 class="fuse">Fuse Core</h2>
            <p class="subtitulo">Frontend Developer</p>
            <ul>
                <li><i class="fa-brands fa-x-twitter "></i></li>
                <li><i class="fa-brands fa-weibo"></i></li>
                <li><i class="fa-brands fa-gitlab"></i></li>
                <li><i class="fa-solid fa-book-open"></i></li>
                <li><i class="fa-regular fa-envelope"></i></li>
                <li><i class="fa-solid fa-key"></i></li>
            </ul>
            <p class="final">Any (multiline) text containing simple HTML, such as links or ... lorem ipsum.</p>
        </div>
    </div>
</body>

</html>
