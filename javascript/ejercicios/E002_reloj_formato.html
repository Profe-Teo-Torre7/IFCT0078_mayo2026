<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj con formato</title>
    <style>
        @font-face {
            font-family: "seven";
            src: url("fuentes/fs-sevegment.otf.woff2") format("woff2");
        }

        * {
            margin: 0;
            padding: 0;
        }

        html {
            font-family: monospace;
        }

        body {
            background-color: rgba(250, 235, 215, 0.7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .contenedor {
            width: 700px;
            border: 10px solid black;
            border-radius: 9px;
            background-color: #d8dece;
            padding: 25px;
        }

        .arriba {
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center;
        }

        .mna {
            font-size: 70px;
            /* font-weight: bold; */
            text-align: center;
        }

        .hora-min {
            display: grid;
            grid-template-columns: auto 0.55em auto;
            justify-content: center;
            align-items: center;

            font-family: "seven", sans-serif;
            font-size: 150px;
            text-align: center;
        

        }

        #segundos {
            font-family: "seven", monospace;
            font-size: 60px;
        }

        .linea {
            height: 3px;
            background-color: black;
            margin: 20px 0;
        }

        .abajo {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }

        .celda {
            text-align: center;
            border-right: 2px solid black;
        }

        .celda:last-child {
            border-right: none;
        }

        .etiqueta {
            font-size: 24px;
            margin-bottom: 8px;

        }

        .valor {
            font-family: monospace;
            font-size: 60px;
        }


    </style>
</head>

<body>
    <div class="contenedor">
        <div class="arriba">
            <div class="mna" id="ampm">AM</div>
            <div class="hora-min" id="reloj">
                <span id="horas">00</span>
                <span id="puntos">:</span>
                <span id="minutos">00</span>
            </div>
            <div id="segundos">00</div>
        </div>

        <div class="linea"></div>

        <div class="abajo">
            <div class="celda">
                <div class="etiqueta">DÍA</div>
                <div id="diames" class="valor">31</div>
            </div>
            <div class="celda">
                <div class="etiqueta">MES</div>
                <div id="mes" class="valor">12</div>
            </div>
            <div class="celda">
                <div class="etiqueta">DÍA SEM.</div>
                <div id="diasem" class="valor">JUEVES</div>
            </div>
        </div>
    </div>

<script>
        let manejador;
        let mostrar = true;

        function muestra_hora() {
            let anio = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
            let semana = ["DOM","LUN","MAR","MIÉ","JUE","VIE","SAB"];
            let fecha = new Date();
            // let reloj = document.getElementById('reloj');
            // reloj.innerHTML = fecha;
            let horas = fecha.getHours();
            let minutos = fecha.getMinutes();
            let segundos = fecha.getSeconds();
            let dia_mes= fecha.getDate();
            let mes = fecha.getMonth();
            let dia_semana = fecha.getDay();

            if(horas>=12){
                document.getElementById('ampm').textContent='PM';
            }
            else{
                document.getElementById('ampm').textContent='AM';
            }

            let span_horas = document.getElementById('horas');
            let span_minutos = document.getElementById('minutos');
            let span_segundos = document.getElementById('segundos');
            let span_diames = document.getElementById('diames');
            let span_mes = document.getElementById('mes');
            let span_dia_semana = document.getElementById('diasem');

            span_horas.innerHTML = horas.toString().padStart(2, '0');
            span_minutos.innerHTML = minutos.toString().padStart(2, '0');
            span_segundos.innerHTML = segundos.toString().padStart(2, '0');
            span_diames.innerHTML = dia_mes.toString().padStart(2, '0');
            span_mes.innerHTML = anio[mes];
            span_dia_semana.innerHTML = semana[dia_semana];

           

            mostrar = !mostrar;
            if(mostrar == true){
                document.getElementById("puntos").style.visibility = "visible";
            }
            else{
                document.getElementById("puntos").style.visibility = "hidden";
            }
            


        }

        muestra_hora();
        manejador = setInterval(muestra_hora, 1000);
  
    </script>
</body>

</html>
