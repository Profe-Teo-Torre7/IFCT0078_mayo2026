<html lang="en">
<head>

    <style>

            font-family: 'Courier New', Courier, monospace;

        }


       a {
            font-family: Arial, Helvetica, sans-serif;

            font-size: 22px;
        }

        article p{
            text-decoration: none;
            background-color: green;
            color:yellow;
        }
    </style>
    <title>Selectores</title>
</head>
<body>
    <h1 class="rojo">Hola Mundo</h1>

            wlkjd hflkwdhflkj hflkwje hflwkj
        </p>
    </header>
    <h2  id="primero">
        este es un H2
    </h2>
    <a href="">Este es un enlace</a>
    <article>
        <p>
            Texto basura <a href="">enlace lejano</a>

</html>
