<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introducción a grid css</title>
    <style>
        .contenedor{
            
            display:grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 10px;

        }

        .contenedor div{
            border: 1px solid blue;
            height:200px;
        }

        /* Areas */
        .areas{
            display:grid;
            grid-template-columns: minmax(0,1fr) 7fr 1fr; 
            grid-template-areas: 
            "cabecera cabecera cabecera"
            "lateral  cuerpo   derecha"
            "pie      pie      pie";
        }
        .inicio{
            grid-area:cabecera;
            height: 80px;
            background-color: aqua;
            grid-column-start: 2;
            grid-column-end: 3;
        }
        .col1{
            grid-area:lateral;
            height: 300px;
            background-color: rgb(243, 207, 60); 
                     
        }
        .col2{
            grid-area:cuerpo;
            height: 300px;
            background-color: rgb(214, 239, 239);            
        }
        .col3{
            grid-area:derecha;
            height: 300px;
            background-color: rgb(139, 227, 152);               
        }
        .final{
            grid-area:pie;
            height: 80px;
            background-color: rgb(31, 247, 35);            
        }


    </style>
</head>
<body>
    <div class="areas">
        <div class="inicio">Cabecera</div>
        <div class="col1">Lateral</div>
        <div class="col2">Cuerpo</div>
        <div class="col3">Derecha</div>
        <div class="final">Pie</div>
    </div>
    <div class="contenedor">
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
        <div>F</div>
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
    </div>


</body>
</html>
