<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            width: 70%;
            height: 800px;
            margin: 0 auto;
            background-color: black;
            padding: 20px;
            border-radius: 5px;
        }

        .div1 {
            background-image: url("img/1.png");
            grid-area: 1 / 1 / 2 / 2;
        }

        .div2 {
            background-image: url("img/2.png");
            grid-area: 1 / 2 / 2 / 3;
        }

        .div3 {
            background-image: url("img/3.png");
            grid-area: 1 / 3 / 2 / 5;
        }

        .div4 {
            background-image: url("img/4.png");
            grid-area: 2 / 1 / 4 / 2;
        }

        .div5 {
            background-image: url("img/5.png");
            grid-area: 2 / 2 / 3 / 4;
        }

        .div6 {
            background-image: url("img/7.png");
            grid-area: 3 / 2 / 4 / 4;
        }

        .div7 {
            background-image: url("img/6.png");
            grid-area: 2 / 4 / 3 / 5;
        }

        .div8 {
            background-image: url("img/8.png");
            grid-area: 3 / 4 / 4 / 5;
        }

        .parent div {
            /* min-height: 200px;
            min-width: 200px; */
            background-size: cover;
            background-position: center;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="div1"> </div>
        <div class="div2"> </div>
        <div class="div3"> </div>
        <div class="div4"> </div>
        <div class="div5"> </div>
        <div class="div6"> </div>
        <div class="div7"> </div>
        <div class="div8"> </div>
    </div>
</body>

</html>
