<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .caja {
            background-color: #eee;
            padding: 20px;
            transition: 0.3s;
            width:500px;
            float:left;
        }

        .caja a {
            color: black;
            text-decoration: none;
            transition: 0.3s;
        }

        /* Cuando el ratón pasa sobre el div */
        .caja:hover {
            background-color: #333;
        }

        /* Cambiar el color del enlace al hacer hover en el div */
        .caja:hover a {
            color: white;
        }
        .contenedor{
            width: 100%;
            height: 500px;
            border:1px solid blue;
        }
        .otra{
            background-color: aqua;
            height:200px;
            width:200px;
            float:left;
        }
    </style>

</head>

<body>
    <div class="contenedor">
    <div class="caja">
        <a href="#">Mi enlace</a>
    </div>
    <div class="otra">
        este es otro elemento
    </div>
</div>
</body>

</html>
