<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Vintage Responsive</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#f3e7d3;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    padding:20px;
}

/* CONTENEDOR */

.calendar{
    width:100%;
    max-width:900px;
    background:#f8f1e3;
    border:6px double #5a4633;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    padding:20px;
}

/* CABECERA */

.header{
    text-align:center;
    padding-bottom:20px;
    border-bottom:2px solid #5a4633;
}

.header h1{
    font-size:clamp(1.8rem,4vw,2.8rem);
    letter-spacing:3px;
    color:#3e2f22;
}

.header p{
    margin-top:8px;
    font-style:italic;
    color:#6b5642;
    font-size:clamp(.85rem,2vw,1rem);
}

/* SEMANA */

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    margin:20px 0 10px;
    font-weight:bold;
    color:#3e2f22;
    letter-spacing:1px;
}

.weekdays div{
    padding:12px 4px;
    border-bottom:1px solid #5a4633;
    font-size:clamp(.75rem,2vw,1rem);
}

/* DÍAS */

.days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
}

.day{
    background:#fff8ea;
    border:1px solid #5a4633;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:110px;
    transition:.25s;
}

.day:hover{
    background:#f0e0c2;
    transform:scale(1.02);
}

.day span{
    font-size:clamp(1.2rem,3vw,2rem);
    font-weight:bold;
    color:#3e2f22;
}

.sunday{
    background:#f7e1d7;
}

.event{
    position:absolute;
    bottom:6px;
    left:6px;
    right:6px;
    text-align:center;
    font-size:0.75rem;
    color:#5a4633;
}

/* PIE */

.footer{
    margin-top:20px;
    text-align:center;
    font-size:clamp(0.8rem,2vw,0.95rem);
    color:#6b5642;
    border-top:2px solid #5a4633;
    padding-top:12px;
}

/* TABLET */

@media (max-width:768px){

    .calendar{
        padding:15px;
    }

    .days{
        gap:4px;
    }

    .day{
        min-height:80px;
    }

    .weekdays div{
        padding:8px 2px;
    }
}

/* MÓVIL */

@media (max-width:480px){

    body{
        padding:10px;
    }

    .calendar{
        padding:10px;
        border-width:4px;
    }

    .day{
        min-height:60px;
    }

    .weekdays div{
        font-size:.7rem;
        padding:6px 0;
    }

    .event{
        display:none;
    }
}
</style>
</head>

<body>

<div class="calendar">

    <div class="header">
        <h1>Octubre 1897</h1>
        <p>Registro de observaciones del viajero</p>
    </div>

    <div class="weekdays">
        <div>Lun</div>
        <div>Mar</div>
        <div>Mié</div>
        <div>Jue</div>
        <div>Vie</div>
        <div>Sáb</div>
        <div>Dom</div>
    </div>

    <div class="days">

        <div></div>

        <div class="day"><span>1</span></div>
        <div class="day"><span>2</span></div>
        <div class="day"><span>3</span></div>
        <div class="day"><span>4</span></div>
        <div class="day"><span>5</span></div>
        <div class="day sunday"><span>6</span></div>

        <div class="day"><span>7</span></div>
        <div class="day"><span>8</span></div>
        <div class="day"><span>9</span></div>
        <div class="day"><span>10</span></div>
        <div class="day"><span>11</span></div>
        <div class="day"><span>12</span></div>
        <div class="day sunday"><span>13</span></div>

        <div class="day"><span>14</span></div>
        <div class="day"><span>15</span></div>
        <div class="day"><span>16</span></div>
        <div class="day"><span>17</span></div>
        <div class="day"><span>18</span></div>
        <div class="day"><span>19</span></div>
        <div class="day sunday"><span>20</span></div>

        <div class="day"><span>21</span></div>
        <div class="day"><span>22</span></div>
        <div class="day"><span>23</span></div>
        <div class="day"><span>24</span></div>
        <div class="day"><span>25</span></div>
        <div class="day"><span>26</span></div>
        <div class="day sunday"><span>27</span></div>

        <div class="day"><span>28</span></div>
        <div class="day"><span>29</span></div>
        <div class="day"><span>30</span></div>
        <div class="day"><span>31</span></div>

    </div>

    <div class="footer">
        “El tiempo se escribe a mano en los márgenes del mundo.”
    </div>

</div>

</body>
</html>
