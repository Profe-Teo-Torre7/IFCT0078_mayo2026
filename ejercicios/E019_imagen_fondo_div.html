<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen de fondo en un div</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .dimensiones {
            height: 100vh;
            width: 100vw;
        }

        .imagen {
            background-image: url("https://picsum.photos/1920/1080");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

            overflow: hidden;
        }

        h1 {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 5rem;
            color: white;
            margin-top: 40vh;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.106);

        }

        .hero {
            width: 100vw;
            height: 100vh;
            overflow: hidden;

        }

        .hero video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body>
    <div class="dimensiones imagen">
        <h1>Soy el número 1</h1>
    </div>
    <div class="dimensiones imagen">
        <h1>Soy el número 2</h1>
    </div>
    <div class="dimensiones imagen">
        <h1>Soy el número 3</h1>
    </div>

    <!-- Video de fondo -->
    <div class="hero">
        <video autoplay muted loop>
            <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">

        </video>
    </div>
</body>

</html>
