<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Original: https://jamstackthemes.dev/demo/theme/chulapa/ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
        }

        header {
            height: 100vh;
            width: 100%;
            background-image: url("img/foto_metro.jpg");
            background-position: right;
            background-size: cover;
            overflow: hidden;
        }

        h1 {
            font-size: 6rem;
            color: white;
            text-transform: uppercase;

        }


        /* Estilos de clase */
        .fondo-gris {
            height: 100%;
            background-color: rgba(140, 139, 139, 0.343);
            padding-top: 37vh;
        }

        .separador {
            width: 12%;
            /* Ancho deseado */
            margin: 15px auto;
            /* 20px arriba/abajo, auto centra horizontalmente */
            border: 0;
            /* Elimina el borde por defecto del navegador */
            border-top: 4px solid #ffffff;
            /* Define el grosor y color */
            border-bottom: 2px solid rgba(69, 69, 69, 0.524);

        }

        .contenedor {
            width: 70vw;
            margin: 0 auto;
            text-align: center;
        }

        .sombra {
            text-shadow: 3px 3px 2px #090909;
        }

        .subtitulo {
            color: white;
            font-size: 1.5rem;
        }
        .pastilla{
            margin: 2rem auto;
            width: fit-content;
            /* color:white; */
            border:1px solid white;
            padding: 10px;
            border-radius: 10px;           
        }
        .pastilla a{
            font-size: 1.2rem;
            color:white;
            text-decoration: none;
        }
        .pastilla:hover{
            background-color: rgba(241, 243, 243, 0.63);
        }
        .pastilla:hover a{
            color:#090909;
        }
        .pastilla i:hover{
            transform: scale(1.5);
       }

    </style>
    <title>Chulapa</title>
</head>

<body>
    <header>
        <div class="fondo-gris">
            <div class="contenedor">
                <h1 class="sombra">Chulapa</h1>
                <hr class="separador">
                <p class="subtitulo sombra">A full flexible Jekyll theme for Github Pages</p>
                <div class="pastilla">
                    <a href=""><i class="fa-brands fa-github"></i> Follow</a>
                </div>
            </div>
        </div>
    </header>

</body>

</html>
